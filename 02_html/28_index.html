<!doctype html> <!-- html 문서 선언-->
<html lang="ko"> <!-- 문서 시작 및 언어 설정-->
    <head> <!-- 화면 안보이는 설정 칸-->
        <meta charset="utf-8"> <!-- 한글 안깨지게-->
        <title> 시맨틱 구조</title> <!-- 브라우저 상단 탭 제목-->

    </head>
    <body> <!-- 화면에 보이는 내용 칸-->
        <header>
            <h1> 시멘틱 구조 </h1>
            <nav> 홈 ㅣ 소개 ㅣ 연락처</nav>
        </header>
        <main>
            <section>
                <article> <!-- 완결된 글 하나-->
                     첫 번째 글 내용
                </article>
                 <article> 
                     두 번째 글 내용
                </article>
            </section>
        </main>
        <aside> <!-- 본문 옆 보조 내용 -->
            곁다리 정보(사이드바)
        </aside>
        <footer>
            2026 내 사이트
        </footer>
    </body>
</html>

<!--
div는 뜻 없는 빈 상자
시맨틱 태그는 이름만 봐도 무슨 구역인지 드러남.
핵심 : header, nav, main, section, article, aside, footer
-->
