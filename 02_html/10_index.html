<!doctype html> <!-- html 문서 선언-->
<html lang="ko"> <!-- 문서 시작, 한국어 페이지-->
    <head>
        <meta charset="UTF-8">
        <title> 목록·시맨틱</title>
    </head>
    <body>
        <!-- 시맨틱 태그 : 어느 부분인지 뜻이 담긴 이름표 상자-->
         <!-- [TIP] 위는 header, 본문은 main, 아래는 footer / 어디에 둘지 모르겠다면 일단 main에-->
        <header> 맨 위(로고·제목)</header> <!-- header: 페이지 맨 위 구역-->
        <main> <!-- main : 핵심 내용 구역-->
        <ul> <!-- ul : 점 찍힌 목록 상자, li : 목록 안의 한줄-->
            <li> 좋아하는 것 : 영화</li>
            <li> 취미 : 러닝 </li>
            <li> 목표 : 뭘까 진짜</li>
            <li> 집 : 가자 </li>
            <li> 밥 : 먹자 </li>
        </ul>
        </main>
        <footer> 맨 아래 (저작권·연락처)</footer> <!-- 페이지 맨 아래 구역 -->
    </body>
</html>
