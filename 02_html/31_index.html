<!-- ! tap => html 기본 뼈대 자동완성-->
<!DOCTYPE html> 
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <!--ul>ol*N + TAP => ul 안에 ol N개 생성-->
    <ul>
        <li>d</li>
        <li>d</li>
    </ul>
    <!-- #top -->
    <div id="top"></div>

    <!--.box-->
    <div class="box"></div>

    <!--a[href]-->
    <a href="https://www.google.com">구글</a>
    
    <div class="p">안녕</div>
    <div class="p">안녕</div>
    <div class="p">안녕</div>


    <!--
    > : 안에 넣기(자식) ul>li => ul안에 li
    *N : N번 반복
    .이름 : class 붙이기
    #이름 : id 붙이기
    {글자} : 태그 안의 내용
    [속성] : 속성 넣기
    -->
    
</body>
</html>
