<!doctype html> <!--html 문서 선언-->
<html lang="ko"> <!-- 문서 시작, 한국어 페이지-->
    <head> <!-- 화면 안보이는 준비 칸-->
        <meta charset="UTF-8"> <!--한글 안깨지게-->
        <title> class 이름표 </title> <!-- 브라우저 상단 탭 제목-->
    </head>
    <body> <!--화면에 실제로 보이는 내용 칸-->
        <P class="text a"> 벌써 12시가 다 되어가네</P> <!--class : 말 그대로 반으로 묶어두기/ text a 반, text b => css 설정할때 a반 값 설정하고, b반 값 각 class에 적용됨.-->
        <P class="text b"> 오늘은 뭐 먹지</P>
    </body>
</html>
