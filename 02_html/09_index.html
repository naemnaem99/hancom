<!doctype html> <!--html 문서 선언-->
<html lang="ko"> <!-- 문서 시작, 한국어 페이지-->
    <head> <!-- 화면엔 안보임, 설정 값 정도 -->
        <meta charset="UTF-8"> <!-- 한국어 안깨지게-->
        <title> 링크 넣기 </title> <!-- 브라우저 탭 제목-->
    </head>
    <body> <!-- 실제 화면에 보이는 내용-->
        <!-- a = 누르면 다른 곳으로 이동하는 문 (링크)-->
         <!-- href = 이동할 주소 (https://까지 넣어야 동작)-->
       <div> <a href="https://www.google.com"> 구글로 가기 </a></div>
       <br>
        <div><a href="https://www.naver.com"> 네이버로 가기 </a> </div>
        <br> 
        <div><a href="https://www.daum.net"> 다음은 어디?</a></div>
    </body>
</html>
