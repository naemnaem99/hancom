<!doctype html> <!-- html 문서 선언-->
<html lang="ko"> <!-- 문서 시작, 한국어 페이지-->
    <head> <!-- 화면에 안 보이는 페이지 설정? 칸-->
        <meta charset="UTF-8"> <!-- 한글 안 깨지게 -->
        <title> 제목과 문단</title> <!--브라우저 탭에 뜨는 이름-->
    </head>
    <body> <!-- 화면에 보이는 진짜 내용 칸-->
    <!-- 제목은 크기 6단계: h1이 젤 큰 놈, 숫자 커질수록 작아짐-->
        <h1> 가장 큰 제목</h1>
        <h2> 중간 제목 </h2>
        <h3> 작은 제목 </h3>
        <h4> 쪼꼬미 제목</h4>
        <h5> 쪼꼬미 제목보다 작은 쪼꼬미 제목</h5>
        <h6> 쪼꼬미 제목보다 작은 쪼꼬미 제목보다 작은 쪼꼬미 제목</h6>
        <!--p = 글 한 덩어리(문단)-->
        <p> 저는 코딩을 처음 배우는 학생입니다</p>       
    </body>
</html>
