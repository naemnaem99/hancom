<!doctype html> <!--html 문서 선언-->
<html lang="ko"> <!-- html 시작 및 언어 설정-->
    <head> <!-- 화면 안보이는 준비 칸-->

        <title> 
            HTML 접기
        </title> <!--브라우저 상단 탭 제목-->
    <body> <!-- 화면에 보이는 내용 칸-->
        <h1> 접기</h1>
        <details> <!--details= 클릭하면 펴고 접히는 상자-->
            <summary> <!-- 항상 보이는 제목 -->
                정답 보기
            </summary>
            <p> 정답 0</p> 
            <p> 정답 1</p> 
            <p> 정답 2</p> 
            <p> 정답 3</p> 
        
        </details>
    </body>
    </head>
</html>
