<!doctype html>
<html lang="ko">
    <head>
        <meta charset="utf-8">
        <title>입력 폼</title>
    </head>
    <body>
        <form> <!--입력칸을 담는 묶음 상자-->
            <label> <!--입력칸 좌측에 위치한 설명 글-->
                이름 : <input type="text" placeholder="이름 입력"> <!--input= 글자를 쓰는 빈칸 / placeholder : 입력 예시 회색글씨-->
            </label>      
            <br> <hr>
            <label>
                나이 : <input type="number" placeholder="22">
            </label>
            <br> <!-- 분리 -->
            <hr> 
            <label>
                좋아하는 색 : <input type="color">
            </label>
            <br> <!-- 분리 -->
            <hr>  
            <button type="reset"> 초기화 </button>
            <button type="submit"> 보내기 </button>
        </form>
    </body>    
</html>
