<!doctype html>
<html lang="ko">
    <head>
        <meta charset="UTF-8">
        <title> 태그 앤 뼈대</title>
    </head>
    <!-- 화면에 안 보이는 준비 칸 -->
     <body>
        <h1> 태그와 뼈대를 공부해볼까나 </h1>
        <p>- 요소(element) = 여는 태그 + 내용 + 닫는 태그
- 태그 이름은 대소문자 안 가림 (H1=h1) </p>
     </body>
</html>
<!-- - 요소(element) = 여는 태그 + 내용 + 닫는 태그
