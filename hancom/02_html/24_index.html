<!doctype html> <!-- html 문서 선언-->
<html lang="ko"> <!-- 문서 시작, 한국어 페이지-->
    <head> <!--화면에 보이지 않는 설정 칸-->
        <meta charset="utf-8"> <!--한글 안깨지게-->
        <title> 입력 Type </title> <!--브라우저 상단 탭 제목-->
    </head>
    <body> <!--화면에 보이는 내용 칸-->
        <h1> 입력 Type</h1>
        <form> <!--
            form=입력칸들을 담는 상자
            label=입력칸 좌측 설명 라벨
            input= 입력칸 type=어떤 타입의 내용인지
            placeholder=예시 회색글씨
            type=>email,password,checkbox,date,radio / radio는 하나만 고르는 동그라미, 선택지가 2개 이상일 때 name으로 묶어서 중복 선택 안되게 설정해야함.
            -->
            <label> 이메일: <input type="email" placeholder="hancom@hancom.com">  </label>
            <br>
            <label> 비밀번호: <input type="password"></label>
            <br>
            <label> 동의:<input type="checkbox"> 보감: <input type="checkbox"></label>
            <br>
            <label> 성별: <input type="radio" name="gender"> 남 </label>
            <label><input type="radio" name="gender"> 여 </label>
            <br>
            <label> 날짜: <input type="date"></label>
            <br>
            <textarea> <!-- 말그대로 텍스트지역, 글 쓰는 공간.-->
                안녕하세요!
            </textarea>
            <br>
            <select> <!-- 아래 옵션 중 하나 선택할 수 있게 함-->
                <option> 서울</option>
                <option> 부산</option>
                <option> 제주</option>
            </select>
        </form>
    </body>
</html>
