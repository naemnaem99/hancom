<!doctype html> <!--html 문서 선언-->
<html lang="ko"> <!-- 문서 시작, 한국어 페이지-->
    <head> <!-- 화면 안보이는 준비 칸-->
        <meta charset="utf-8"> <!-- 한글 안깨지게-->
        <title>span 상자</title> <!--브라우저 상단 탭 제목-->
    </head>
    <body> <!--화면에 보이는 내용 칸-->
        <p> 글자 중 <span> 여기만 </span>강조</p> <!--span=글자 사이 일부만 묶는 인라인 상자(줄 안 바꿈)-->
    </body>
</html>
