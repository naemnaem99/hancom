<!DOCTYPE html> <!--html 문서 선언-->
<html lang="ko"> <!-- 문서 시작, 한국어 페이지-->
    <head> <!--화면에 안보이는 설정 칸-->
        <meta charset="utf-8"> <!-- 한글 안깨지게 -->
        <title> 영상 넣기 </title> <!--브라우저 상단 탭 제목-->
    </head> 
    <body> <!--화면에 보이는 내용 칸-->
        <h1>영상 넣기</h1> <!--대제목-->
        <video  controls width="320" src="../02_html/video.mp4" autoplay muted> 
            <!-- controls=재생 버튼
                autoplay= 자동재생 but 소리있는 영상은 muted 처리해야 자동재생이 된다. 사용자가 예기치 않은 소리에 놀랄 수 있어서 브라우저 설정값이 그렇다고 함. 
            -->

        </video>
    </body>
</html>
