<!doctype html> <!--html 문서 선언-->
<html lang="ko"> <!-- 문서 시작, 한국어 페이지-->
    <head> <!-- 화면엔 안 보이는 준비 칸-->
        <meta charset="utf-8"> <!-- 한글 안깨지게 -->
        <title> 번호 목록 </title> <!--브라우저 상단 탭 제목-->
    </head> 
    <body> <!-- 화면에 실질적으로 보이는 내용 입력 칸-->
        <header>
            <h3>아침 할 일</h3>
        </header>
        <ol> <!--ol: 번호가 자동으로 붙는 목록, 순서가 중요할 떄 사용하는 태그 -->
            <li> 일어나기 </li> <!--1번항목-->
            <li> 세수하기 </li> <!--2번항목-->
            <li> 아침먹기 </li> <!--3번항목-->
            <ol type="A">
                <li>콩</li>
                <li>고기</li>
                <li>밥</li>
            </ol>
        </ol>
    </body>
</html>
