<!doctype html>
<html lang="ko">
    <head>
        <meta charset="utf-8">
        <title>
            글자 꾸미기
        </title>
    <body>
        <h1>글자 꾸미기</h1>
        <p><em>기울임 강조</em></p>
        <p><mark>형광펜</mark></p>
        <p><small>작게 쓰는 글씨</small></p>
        <blockquote>인용문</blockquote>
        <p>H<sub>2</sub>O</p>
        <p>X<suP>2</suP></p>
        <!--
        em=기울임
        mark=형광펜
        small=작은 글씨
        sub=아래첨자
        sup=위첨자
        blockquote=인용문
        -->
    </body>
    </head>
</html>
