<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="style.css" />
  <title>계산기</title>
</head>
<body>
  <main class="calculator">
    <!-- 계산기 상단 테두리 위를 좌우로 걸어다니는 검은색 픽셀 몬스터 (장식용) -->
    <div class="pixel-monster" aria-hidden="true">
      <span class="pixel-frame pixel-frame-a"></span>
      <span class="pixel-frame pixel-frame-b"></span>
    </div>

    <div class="display">
      <div class="history" id="history"></div>
      <div class="result" id="result">0</div>
    </div>

    <div class="keys">
      <button class="key key--func" data-action="clear">AC</button>
      <button class="key key--func" data-action="sign">±</button>
      <button class="key key--func" data-action="percent">%</button>
      <button class="key key--op" data-action="operator" data-op="/">÷</button>

      <button class="key" data-action="number" data-value="7">7</button>
      <button class="key" data-action="number" data-value="8">8</button>
      <button class="key" data-action="number" data-value="9">9</button>
      <button class="key key--op" data-action="operator" data-op="*">×</button>

      <button class="key" data-action="number" data-value="4">4</button>
      <button class="key" data-action="number" data-value="5">5</button>
      <button class="key" data-action="number" data-value="6">6</button>
      <button class="key key--op" data-action="operator" data-op="-">−</button>

      <button class="key" data-action="number" data-value="1">1</button>
      <button class="key" data-action="number" data-value="2">2</button>
      <button class="key" data-action="number" data-value="3">3</button>
      <button class="key key--op" data-action="operator" data-op="+">+</button>

      <button class="key key--zero" data-action="number" data-value="0">0</button>
      <button class="key" data-action="decimal">.</button>
      <button class="key key--func" data-action="backspace">⌫</button>
      <button class="key key--equal" data-action="equals">=</button>
    </div>
  </main>

  <script src="script.js"></script>
</body>
</html>
