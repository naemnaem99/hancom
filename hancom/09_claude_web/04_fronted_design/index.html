<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="CALC · SERIES 07 — 8비트 흑백 데스크 계산기" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
  <title>CALC · SERIES 07</title>
  <!-- 첫 페인트 전에 테마 결정 (깜빡임 방지) -->
  <script>
    (function () {
      try {
        var t = localStorage.getItem("calc-theme");
        if (!t) t = window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light";
        document.documentElement.setAttribute("data-theme", t);
      } catch (e) {
        document.documentElement.setAttribute("data-theme", "light");
      }
    })();
  </script>
</head>
<body>
  <main class="stage">
    <!-- 계산기 장치 -->
    <section class="device" aria-label="계산기">
      <!-- 시그니처: 계산기 테두리를 걸어다니는 픽셀 몬스터 -->
      <div class="pixel-monster" aria-hidden="true">
        <span class="pixel-frame pixel-frame-a"></span>
        <span class="pixel-frame pixel-frame-b"></span>
      </div>

      <!-- 모델 명판 -->
      <header class="plate">
        <span class="plate__mark">CALC</span>
        <span class="plate__sep" aria-hidden="true">·</span>
        <span class="plate__model">SERIES 07</span>
        <button class="theme-toggle" id="theme-toggle" type="button" aria-label="다크 모드로 전환" aria-pressed="false">
          <span class="theme-toggle__icon" aria-hidden="true">○</span>
        </button>
      </header>

      <!-- 디스플레이 -->
      <div class="display">
        <div class="display__expr" id="expr" aria-hidden="true">&nbsp;</div>
        <output class="display__result" id="result" aria-live="polite">0</output>
      </div>

      <!-- 키패드 -->
      <div class="keypad" id="keypad">
        <button class="key key--fn" data-action="clear" aria-label="전체 지우기">AC</button>
        <button class="key key--fn" data-action="negate" aria-label="부호 전환">±</button>
        <button class="key key--fn" data-action="percent" aria-label="백분율">%</button>
        <button class="key key--op" data-op="÷" aria-label="나누기">÷</button>

        <button class="key" data-num="7">7</button>
        <button class="key" data-num="8">8</button>
        <button class="key" data-num="9">9</button>
        <button class="key key--op" data-op="×" aria-label="곱하기">×</button>

        <button class="key" data-num="4">4</button>
        <button class="key" data-num="5">5</button>
        <button class="key" data-num="6">6</button>
        <button class="key key--op" data-op="−" aria-label="빼기">−</button>

        <button class="key" data-num="1">1</button>
        <button class="key" data-num="2">2</button>
        <button class="key" data-num="3">3</button>
        <button class="key key--op" data-op="+" aria-label="더하기">+</button>

        <button class="key key--wide" data-num="0">0</button>
        <button class="key" data-action="decimal" aria-label="소수점">.</button>
        <button class="key key--equals" data-action="equals" aria-label="계산">=</button>
      </div>
    </section>

    <!-- 계산 내역 테이프 -->
    <aside class="tape" aria-label="계산 내역">
      <div class="tape__head">
        <span class="tape__title">TAPE</span>
        <button class="tape__clear" id="tape-clear" type="button">CLR</button>
      </div>
      <div class="tape__roll">
        <ul class="tape__list" id="tape-list"></ul>
        <p class="tape__empty" id="tape-empty">계산 기록이 여기에 쌓입니다.</p>
      </div>
    </aside>
  </main>

  <script src="script.js" defer></script>
</body>
</html>
