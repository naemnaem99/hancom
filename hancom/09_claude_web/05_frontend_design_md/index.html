<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
  <title>Calculator</title>
</head>
<body>
  <main>
    <div class="calc-card" role="application" aria-label="계산기">

      <span class="calc-label">Calculator</span>

      <div class="calc-display" aria-live="polite" aria-atomic="true">
        <div class="calc-history" id="history" aria-label="계산 기록"></div>
        <output class="calc-result" id="result" aria-label="계산 결과">0</output>
      </div>

      <div class="calc-keys" role="group" aria-label="키패드">
        <button class="key key-util" data-action="clear">AC</button>
        <button class="key key-util" data-action="negate" aria-label="부호 변환">±</button>
        <button class="key key-util" data-action="percent" aria-label="퍼센트">%</button>
        <button class="key key-op"   data-action="operator" data-value="÷" aria-label="나누기">÷</button>

        <button class="key key-num" data-action="number" data-value="7">7</button>
        <button class="key key-num" data-action="number" data-value="8">8</button>
        <button class="key key-num" data-action="number" data-value="9">9</button>
        <button class="key key-op"  data-action="operator" data-value="×" aria-label="곱하기">×</button>

        <button class="key key-num" data-action="number" data-value="4">4</button>
        <button class="key key-num" data-action="number" data-value="5">5</button>
        <button class="key key-num" data-action="number" data-value="6">6</button>
        <button class="key key-op"  data-action="operator" data-value="−" aria-label="빼기">−</button>

        <button class="key key-num" data-action="number" data-value="1">1</button>
        <button class="key key-num" data-action="number" data-value="2">2</button>
        <button class="key key-num" data-action="number" data-value="3">3</button>
        <button class="key key-op"  data-action="operator" data-value="+" aria-label="더하기">+</button>

        <button class="key key-num key-zero" data-action="number" data-value="0">0</button>
        <button class="key key-num" data-action="decimal" aria-label="소수점">.</button>
        <button class="key key-primary" data-action="equals" aria-label="결과">=</button>
      </div>

      <p class="calc-hint">Backspace · Esc · 키보드 지원</p>

    </div>
  </main>
  <script src="calculator.js"></script>
</body>
</html>
